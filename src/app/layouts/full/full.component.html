<span [dir]="options.dir!">
  <mat-sidenav-container class="mainWrapper blue_theme light-theme" autosize autoFocus dir="ltr">

    <!-- Sidebar -->
    <mat-sidenav #leftsidenav [mode]="isOver ? 'over' : 'side'" [opened]="!isOver"
      (openedChange)="onSidenavOpenedChange($event)" (closedStart)="onSidenavClosedStart()" class="sidebarNav">
      <div class="flex-layout flex flex-col h-full">
        <app-sidebar (toggleMobileNav)="sidenav.toggle()" [showToggle]="isOver"></app-sidebar>
        <ng-scrollbar class="relative" style="height: 100%">
          <mat-nav-list class="sidebar-list">
            @for(item of navItems; track item) {
              <app-nav-item [item]="item" (notify)="sidenav.toggle()" class="top-parent"></app-nav-item>
            }
          </mat-nav-list>
        </ng-scrollbar>
        <div class="p-6">
          <div class="bg-light-primary flex items-center gap-3 rounded p-5 mt-5">
            <div class="flex-shrink-0">
              <h5 class="text-base font-semibold mb-2 max-w-24">Want More Features?</h5>
              <a mat-flat-button href="https://tailwind-admin.com/#pricing" target="_blank">Upgrade</a>
            </div>
            <img src="/assets/images/backgrounds/rocket.png" alt="image" class="side-img -mt-12" />
          </div>
        </div>
      </div>
    </mat-sidenav>

    <!-- Área derecha: header fijo + contenido scrolleable -->
    <mat-sidenav-content class="contentWrapper" #content>

      <!-- Header FUERA del scroll — ocupa ancho completo, altura fija -->
      <app-header
        class="layout-header"
        [showToggle]="!isOver"
        (toggleCollapsed)="toggleCollapsed()"
        (toggleMobileNav)="sidenav.toggle()"
        (toggleMobileFilterNav)="toggleFilterNav()"
        (optionsChange)="receiveOptions($event)">
      </app-header>

      <!-- Zona scrolleable: solo main + footer se desplazan -->
      <div class="scroll-area">
        <main class="pageWrapper" [ngClass]="{ maxWidth: options.boxed }">
          <router-outlet></router-outlet>
        </main>
      </div>

    </mat-sidenav-content>

  </mat-sidenav-container>
</span>
