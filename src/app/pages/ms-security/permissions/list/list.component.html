<div class="p-6">
  <mat-card class="cardWithShadow mb-6">
    <div class="flex items-center justify-between p-4">
      <div>
        <h2 class="text-2xl font-bold">Gestión de Permisos</h2>
        <p class="text-gray-600 text-sm">Administra los permisos del sistema</p>
      </div>
      <button mat-flat-button color="primary" (click)="create()" class="flex items-center gap-2">
        <mat-icon>add</mat-icon>
        Nuevo Permiso
      </button>
    </div>
  </mat-card>

  <mat-card class="cardWithShadow">
    @if (loading()) {
      <div class="p-8 text-center">
        <mat-icon class="animate-spin text-2xl">cached</mat-icon>
        <p class="text-gray-600 mt-2">Cargando permisos...</p>
      </div>
    } @else if (permissions().length === 0) {
      <div class="p-8 text-center">
        <mat-icon class="text-4xl text-gray-400">verified_user</mat-icon>
        <p class="text-gray-600 mt-2">No hay permisos registrados</p>
      </div>
    } @else {
      <app-dynamic-table
        [data]="permissions()"
        [columns]="columns"
        [actionButtons]="actionButtons"
        (actionClicked)="handleAction($event)"
      ></app-dynamic-table>
    }
  </mat-card>
</div>
