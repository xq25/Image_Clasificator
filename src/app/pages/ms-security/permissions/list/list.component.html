<div class="list-root">

  <!-- Header sticky -->
  <div class="sticky-header">
    <mat-card class="cardWithShadow header-card">
      <div class="header-inner">
        <div>
          <h2 class="header-title">Gestión de Permisos</h2>
          <p class="header-subtitle">Administra los permisos del sistema</p>
        </div>
        <button mat-flat-button color="primary" (click)="create()" class="btn-new flex items-center gap-2">
          <mat-icon>add</mat-icon>
          Nuevo Permiso
        </button>
      </div>
    </mat-card>
  </div>

  <!-- Tabla -->
  <mat-card class="cardWithShadow table-card">
    @if (loading()) {
      <div class="p-8 text-center">
        <mat-icon class="animate-spin text-2xl">cached</mat-icon>
        <p class="text-gray-600 mt-2">Cargando permisos...</p>
      </div>
    } @else if (permissions().length === 0) {
      <div class="p-8 text-center">
        <mat-icon class="text-4xl text-gray-400">verified_user</mat-icon>
        <p class="text-gray-600 mt-2">No hay permisos registrados</p>
      </div>
    } @else {
      <app-dynamic-table
        [data]="permissions()"
        [columns]="columns"
        [actionButtons]="actionButtons"
        (actionClicked)="handleAction($event)"
      />
    }
  </mat-card>

</div>
