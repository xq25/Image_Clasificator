<div class="p-6">
  <mat-card class="cardWithShadow">
    <div class="page-header flex items-center justify-between">
      <div>
        <p class="eyebrow">Cambiar área</p>
        <h2>Cambiar área de evaluación de la imagen</h2>
      </div>
      <button mat-stroked-button color="primary" type="button" (click)="back()">
        <mat-icon>arrow_back</mat-icon>
        Volver
      </button>
    </div>

    @if (loading) {
      <div class="p-8 text-center">
        <mat-spinner></mat-spinner>
        <p>Cargando áreas...</p>
      </div>
    } @else {
      <form [formGroup]="form" (ngSubmit)="submit()" class="p-4">
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Área de evaluación</mat-label>
          <mat-select formControlName="evaluationAreaId">
            @for (area of areas(); track area.id) {
              <mat-option [value]="area.id">{{ area.name }} ({{ area.codeArea }})</mat-option>
            }
          </mat-select>
        </mat-form-field>

        <div class="mt-4">
          <button mat-flat-button color="primary" type="submit" [disabled]="saving">
            <mat-icon>swap_horiz</mat-icon>
            {{ saving ? 'Procesando...' : 'Cambiar área' }}
          </button>
        </div>
      </form>
    }
  </mat-card>
</div>
