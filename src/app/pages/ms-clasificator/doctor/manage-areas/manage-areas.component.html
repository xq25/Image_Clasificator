<div class="manage-areas-page">

  <!-- HEADER -->
  <div class="page-header">

    <button mat-stroked-button (click)="goBack()" class="back-btn">
      <mat-icon>arrow_back</mat-icon>
      Volver
    </button>

    @if (loadingDoctor()) {
      <div class="doctor-identity">
        <div class="doctor-avatar doctor-avatar--skeleton"></div>
        <div class="doctor-info">
          <div class="skeleton skeleton--name"></div>
          <div class="skeleton skeleton--code"></div>
        </div>
      </div>
    } @else if (doctor()) {
      <div class="doctor-identity">
        <div class="doctor-avatar">{{ getDoctorInitials() }}</div>
        <div class="doctor-info">
          <span class="doctor-name">{{ doctor()?.userInfo?.name ?? 'Doctor' }}</span>
          <span class="doctor-meta">
            <mat-icon class="doctor-meta__icon">badge</mat-icon>
            Cód. {{ doctor()?.code }}
          </span>
        </div>
      </div>
    }

  </div>

  <!-- TÍTULO DE SECCIÓN -->
  <div class="section-heading">
    <mat-icon class="section-heading__icon">manage_accounts</mat-icon>
    <div>
      <h2 class="section-heading__title">Gestión de áreas</h2>
      <p class="section-heading__sub">
        Asocia o desvincula las áreas de evaluación que este doctor puede atender.
      </p>
    </div>
  </div>

  <!-- COMPONENTE GENÉRICO DE ASOCIACIÓN -->
  <app-entity-association
    [allItems]="allAreas()"
    [associatedItems]="associatedAreas()"
    [config]="config"
    [loadingAssociated]="loadingAssociated()"
    [loadingAll]="loadingAll()"
    [onAssociate]="onAssociate"
    [onDisassociate]="onDisassociate"
  />

</div>
