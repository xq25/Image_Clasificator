<div class="p-6">
  <mat-card class="cardWithShadow mb-6">
    <div class="flex items-center justify-between p-4">
      <div>
        <h2 class="text-2xl font-bold">Gestión de Áreas de Evaluación</h2>
        <p class="text-gray-600 text-sm">Administra las áreas de evaluación del sistema</p>
      </div>
      <button mat-flat-button color="primary" (click)="create()" class="flex items-center gap-2">
        <mat-icon>add</mat-icon>
        Nueva Área
      </button>
    </div>
  </mat-card>

  <mat-card class="cardWithShadow">
    <div *ngIf="loading()" class="p-8 text-center">
      <mat-icon class="animate-spin text-2xl">cached</mat-icon>
      <p class="text-gray-600 mt-2">Cargando áreas de evaluación...</p>
    </div>

    <div [hidden]="loading()">
      <app-dynamic-table
        [data]="evaluationAreas()"
        [columns]="columns"
        [actionButtons]="actionButtons"
        (actionClicked)="handleAction($event)"
      ></app-dynamic-table>
    </div>
  </mat-card>
</div>
