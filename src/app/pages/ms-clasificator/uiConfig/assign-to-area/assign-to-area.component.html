<div class="p-6">
  @if (loading) {
    <div class="flex items-center justify-center h-screen">
      <mat-spinner></mat-spinner>
    </div>
  } @else if (formConfig) {
    <mat-card class="mb-6 cardWithShadow">
      <div class="flex flex-col gap-2 p-4">
        <div class="flex items-center justify-between gap-4 flex-wrap">
          <div>
            <h2 class="text-2xl font-bold">Asignar UI Config a área</h2>
            <p class="text-gray-600 text-sm">Selecciona el área de evaluación para esta configuración.</p>
          </div>

          <button mat-stroked-button color="primary" type="button" (click)="goBack()">
            <mat-icon>arrow_back</mat-icon>
            Volver
          </button>
        </div>

        @if (uiConfig?.evaluationAreaId) {
          <div class="flex items-center justify-between gap-4 rounded-lg border border-dashed p-4">
            <div>
              <p class="font-semibold">Área actual</p>
              <p class="text-sm text-gray-600">ID: {{ uiConfig?.evaluationAreaId }}</p>
            </div>

            <button mat-flat-button color="warn" type="button" (click)="removeFromArea()" [disabled]="saving">
              <mat-icon>link_off</mat-icon>
              Desasignar
            </button>
          </div>
        }
      </div>
    </mat-card>

    <app-dynamic-form
      [config]="formConfig"
      (formSubmit)="handleFormSubmit($event)"
      (formCancel)="handleFormCancel()"
    />
  }
</div>
