<div class="manage-subdiagnostic-page p-6">

  <div class="page-header mb-6">
    <button mat-stroked-button type="button" (click)="goBack()" class="flex items-center gap-2">
      <mat-icon>arrow_back</mat-icon>
      Volver
    </button>
    @if (parent()) {
      <div class="diagnostic-identity">
        <div class="diagnostic-avatar">{{ (parent()?.diagnosticCode ?? '') | slice:0:2 | uppercase }}</div>
        <div class="diagnostic-info">
          <h2 class="diagnostic-name">{{ parent()?.diagnosticName }}</h2>
          <span class="diagnostic-code">{{ parent()?.diagnosticCode }}</span>
        </div>
      </div>
    }
  </div>

  <app-entity-association
    [allItems]="allDiagnostics()"
    [associatedItems]="subDiagnostics()"
    [config]="associationConfig"
    [loadingAssociated]="loadingSubs()"
    [loadingAll]="loadingAll()"
    [onAssociate]="onAssociate"
    [onDisassociate]="onDisassociate"
  />

</div>
