<div class="flex h-screen w-full overflow-hidden bg-gray-50">
  <!-- Mitad Izquierda - Texto de Bienvenida (Solo en pantallas grandes) -->
  <div class="hidden lg:flex lg:w-1/2 bg-gradient-to-br from-blue-50 to-indigo-100 p-12 flex-col items-center justify-center relative overflow-hidden">
    <!-- Elemento decorativo de fondo -->
    <div class="absolute top-0 right-0 w-96 h-96 bg-gradient-to-bl from-indigo-200 to-transparent rounded-full -mr-48 -mt-48 opacity-50"></div>
    
    <div class="max-w-md relative z-10">
      <div class="mb-8">
        <h1 class="text-5xl font-bold text-gray-900 mb-4 leading-tight">Bienvenido</h1>
        <div class="w-16 h-1 bg-gradient-to-r from-indigo-600 to-blue-600 rounded-full"></div>
      </div>
      <p class="text-lg text-gray-700 leading-relaxed mb-8">
        Selecciona tu tipo de usuario y accede a tu cuenta de forma segura. Inicia sesión como doctor o paciente.
      </p>
      <div class="space-y-4 text-sm text-gray-600">
        <div class="flex items-center">
          <span class="inline-flex items-center justify-center h-8 w-8 rounded-full bg-indigo-600 text-white mr-3 flex-shrink-0">
            <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>
          </span>
          <span>Acceso seguro y encriptado</span>
        </div>
        <div class="flex items-center">
          <span class="inline-flex items-center justify-center h-8 w-8 rounded-full bg-indigo-600 text-white mr-3 flex-shrink-0">
            <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>
          </span>
          <span>Interfaz intuitiva y fácil de usar</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Mitad Derecha - SelectCard y LoginForm -->
  <div class="w-full lg:w-1/2 flex items-center justify-center p-3 lg:p-4 bg-white min-h-0">
    <div class="login-shell w-full max-w-xl px-1 sm:px-2 lg:px-0">
      <mat-card class="cardWithShadow overflow-hidden auth-card border-0 shadow-lg w-full mx-auto">
        <div class="login-card-body bg-white p-3 sm:p-4 lg:p-5">
          <app-login-form
            [selectedUserType]="selectedUserType"
            (formSubmit)="onLoginSubmit($event)"
            (loginWithGoogle)="onGoogleLogin()"
            (loginWithGithub)="onGithubLogin()"
            (loginWithMicrosoft)="loginWithMicrosoft()">
          </app-login-form>
        </div>
      </mat-card>
    </div>
  </div>
</div>
