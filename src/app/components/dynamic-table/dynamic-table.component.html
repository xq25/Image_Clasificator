<div class="relative overflow-auto">
  <table mat-table [dataSource]="data()" class="min-w-full">
    @for(column of displayedColumns(); track column) {
      @if(column !== 'actions') {
        <ng-container [matColumnDef]="column">
          <th mat-header-cell *matHeaderCellDef class="table-header">
            {{ getColumnLabel(column) }}
          </th>
          <td mat-cell *matCellDef="let element" class="table-cell">
            {{ element[column] }}
          </td>
        </ng-container>
      }
    }

    @if(actionButtons().length > 0) {
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="table-header text-center">
          Actions
        </th>
        <td mat-cell *matCellDef="let element" class="table-cell text-center">
          @for(btn of actionButtons(); track btn.action) {
            <button
              mat-icon-button
              [ngClass]="btn.class"
              [title]="btn.label || (btn.action | titlecase)"
              (click)="handleAction(btn.action, element)"
              class="action-button"
            >
              @if(btn.icon) {
                <mat-icon>{{ btn.icon }}</mat-icon>
              } @else if(btn.label) {
                {{ btn.label }}
              }
            </button>
          }
        </td>
      </ng-container>
    }

    <tr mat-header-row *matHeaderRowDef="displayedColumns(); sticky: true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns()"></tr>
  </table>

  @if(data().length === 0) {
    <div class="text-center py-8 text-gray-500">
      No data available
    </div>
  }
</div>
