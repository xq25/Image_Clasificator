<div class="confirm-delete-overlay" (click)="onCancel()">
  <div class="confirm-delete-card" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="onCancel()">
      <mat-icon>close</mat-icon>
    </button>

    <div class="card-body">
      <div class="icon-container">
        <mat-icon class="warning-icon">error_outline</mat-icon>
      </div>

      <h2 class="card-title">{{ title() }}</h2>
      <p class="card-message">{{ message() }}</p>
      <p class="card-sub-message" *ngIf="subMessage()">{{ subMessage() }}</p>

      <div class="card-actions">
        <button mat-stroked-button class="btn-cancel" (click)="onCancel()">
          {{ cancelLabel() }}
        </button>
        <button mat-flat-button class="btn-confirm" (click)="onConfirm()">
          {{ confirmLabel() }}
        </button>
      </div>
    </div>
  </div>
</div>
